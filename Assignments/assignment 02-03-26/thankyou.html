<!DOCTYPE html>
<html>
<head>
    <title>Thank You</title>
    <style>
        body { font-family: Arial; margin: 40px; text-align: center; }
        h1 { color: green; }
    </style>
</head>
<body>

<h1>Form Submitted Successfully!</h1>
<p id="greeting"></p>

<script>
    // Get the name from URL parameter
    const urlParams = new URLSearchParams(window.location.search);
    const name = urlParams.get("name");
    if (name) {
        document.getElementById("greeting").textContent = `Thank you, ${name}, for submitting the form.`;
    }
</script>

</body>
</html>
